version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: annquote_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-annquote}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-annquote_pass}
      POSTGRES_DB: ${POSTGRES_DB:-annquote_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-annquote}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: annquote_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-annquote}:${POSTGRES_PASSWORD:-annquote_pass}@db:5432/${POSTGRES_DB:-annquote_db}
      SECRET_KEY: ${SECRET_KEY:-changeme_in_production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: annquote_frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
